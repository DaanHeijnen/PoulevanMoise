<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#8f2d00">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <title>Nieuwe update - Poule van Moise</title>
  <link rel="stylesheet" href="/assets/css/app.css?v=matches-title-width-1">
</head>
<body data-page="admin-create">
  <header class="site-header">
    <a class="brand" href="/" aria-label="Poule van Moise startpagina">
      <span class="ball">⚽</span>
      <span>Poule van Moise</span>
    </a>
    <nav class="site-nav" aria-label="Hoofdnavigatie">
      <a href="/">Updates</a>
      <a href="/wedstrijden.html">Wedstrijden</a>
      <a href="/rankings.html">Rankings</a>
      <a href="/admin-overview.html" aria-current="page">Admin dashboard</a>
      <button class="nav-button" id="logout-button" type="button">Uitloggen</button>
    </nav>
  </header>
  <main class="page admin-page">
    <section class="panel">
      <p class="eyebrow">Admin console</p>
      <h1>Create new update</h1>
      <form id="update-form" class="form">
        <label>Headline<input type="text" name="title" required maxlength="255" placeholder="E.g. Netherlands clinch dramatic win"></label>
        <label>Story<textarea name="contentMarkdown" rows="12" required placeholder="Start writing the full story here... Markdown is supported."></textarea></label>
        <label>Featured image<input type="file" name="photos" accept="image/jpeg,image/png,image/webp" multiple></label>
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Publiceer update</button>
          <a class="btn btn-secondary" href="/admin-overview.html">Annuleren</a>
        </div>
        <p id="form-error" class="error-message" hidden></p>
      </form>
    </section>
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <h2>WK nieuws<br>door Moise<br>Maatje</h2>
      <div class="footer-actions">
        <button class="footer-link" id="share-site" type="button">Share</button>
        <a class="footer-link" href="mailto:moisemaatje2@gmail.com">Contact</a>
        <a class="footer-link" href="/admin-login.html">Admin login</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/app.js?v=polling-2" defer></script>
</body>
</html>
